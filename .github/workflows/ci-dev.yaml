name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        service: [product]

    steps:
      - uses: actions/checkout@v4

      - name: Check commit author
        if: github.event.head_commit.author.name == 'github-actions'
        run: exit 0 # Thoát workflow nếu commit được thực hiện bởi bot

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25' # Phải khớp với phiên bản dự án yêu cầu
          distribution: 'temurin' # Hoặc 'adopt' tùy bạn chọn

      - name: Build Java application
        run: |
          mvn clean verify -pl ${{ matrix.service }} -am -T 1C -B -ntp

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build và Push Image lên GHCR
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}

      # 2. Cập nhật tag mới vào file values.yaml
      - name: Update Helm values
        run: |
          # Dùng yq để cập nhật tag trong file values.yaml
          # Giả sử file values.yaml của bạn có cấu trúc image.tag: ...
          sed -i "s|tag:.*|tag: ${{ github.sha }}|" k8s/env/dev/product-values.yaml

      # 3. Commit và Push lại file vừa cập nhật
      - name: Commit and Push manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 1. Đảm bảo workspace sạch sẽ trước khi làm việc
          git reset --hard HEAD
          git clean -fd
          
          # 2. Fetch và đảm bảo branch dev ở trạng thái mới nhất
          git fetch origin dev
          git checkout dev
          git reset --hard origin/dev
          
          # 3. Thực hiện thay đổi file
          sed -i "s|tag:.*|tag: ${{ github.sha }}|" k8s/env/dev/${{ matrix.service }}-values.yaml
          
          # 4. Kiểm tra và commit
          if git diff --quiet k8s/env/dev/${{ matrix.service }}-values.yaml; then
            echo "Không có thay đổi nào trong file, bỏ qua bước commit."
          else
            git add k8s/env/dev/${{ matrix.service }}-values.yaml
            git commit -m "Update image tag for ${{ matrix.service }} to ${{ github.sha }} [skip ci]"
            git push origin dev  # Đẩy thẳng vào dev
          fi

 