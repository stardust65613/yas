name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        service: [product]

    steps:
      - uses: actions/checkout@v4

      - name: Check commit author
        if: github.event.head_commit.author.name == 'github-actions'
        run: exit 0 # Thoát workflow nếu commit được thực hiện bởi bot

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25' # Phải khớp với phiên bản dự án yêu cầu
          distribution: 'temurin' # Hoặc 'adopt' tùy bạn chọn

      - name: Build Java application
        run: |
          mvn clean verify -pl ${{ matrix.service }} -am -T 1C -B -ntp

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build và Push Image lên GHCR
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}

      # 2. Cập nhật tag mới vào file values.yaml
      - name: Update Helm values
        run: |
          # Dùng yq để cập nhật tag trong file values.yaml
          # Giả sử file values.yaml của bạn có cấu trúc image.tag: ...
          sed -i "s|tag:.*|tag: ${{ github.sha }}|" k8s/env/dev/product-values.yaml

      # 3. Commit và Push lại file vừa cập nhật
      - name: Commit and Push manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 1. Lưu tạm những thay đổi vào stash
          git stash
          
          # 2. Cập nhật mới nhất từ server
          git fetch origin dev
          git rebase origin/dev
          
          # 3. Lấy lại những thay đổi từ stash
          git stash pop
          
          # 4. Giờ thì có thể add, commit và push
          git add k8s/env/dev/${{ matrix.service }}-values.yaml
          git commit -m "Update image tag for ${{ matrix.service }} to ${{ github.sha }} [skip ci]"
          git push origin HEAD:dev
          
