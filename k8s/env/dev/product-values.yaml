backend:

  # --------------------------------------------------------------------------
  # IMAGE — Which Docker image to deploy.
  #   repository: Full path to the OCI image on GitHub Container Registry.
  #               Format is ghcr.io/<org>/<service-name>
  #   tag: ceb0b9210c68198bb6a4a9d373339e9d94407212
  #               most recent build. The CI pipeline will change this to
  #               "dev-<commit-sha>" for traceability.
  #   pullPolicy: Override from common (IfNotPresent → Always for dev)
  #               so every pod restart pulls the newest image.
  # --------------------------------------------------------------------------
  image:
    repository: ghcr.io/stardust65613/product
    tag: ceb0b9210c68198bb6a4a9d373339e9d94407212
    # NOTE: CI pipeline (ci-dev.yaml) will automatically replace "latest"
    # with "dev-<github.sha>" on every push to main. We keep "latest" as
    # the default so local devs can still do `helm install` manually.

  nameOverride: product
  fullnameOverride: product
  databaseName: product
  ingress:
    enabled: false
  extraVolumes:
    - name: product-application-config
      configMap:
        name: product-application-configmap
  extraVolumeMounts:
    - name: product-application-config
      mountPath: /opt/yas/product
  extraApplicationConfigPaths:
    - /opt/yas/product/product-application.yaml  

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi